<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мероприятия</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Дополнительные стили для модального окна участника */
        .scan-instruction {
            background: #e8f0fe;
            color: #4f8df5;
            padding: 12px 24px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            margin: 10px 0;
        }
        
        .qr-code-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .qr-code-container img {
            width: 250px;
            height: 250px;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }
        
        .participant-info-card {
            width: 100%;
            margin-top: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .participant-info-card h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .participant-info-card h3 i {
            color: #4f8df5;
        }
        
        .participant-info-item {
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }
        
        .participant-info-label {
            font-size: 12px;
            color: #666;
        }
        
        .participant-info-value {
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="index.html">
            <img src="images/logo-nngasu.png" alt="ННГАСУ">
        </a>
    </div>

    <div class="header-title" id="pageTitle">
        Мероприятия
    </div>

    <div class="header-right" id="authSection">
        <a href="auth.html" class="auth-btn">Авторизация</a>
    </div>

</header>

<div class="layout">

    <aside class="sidebar">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 Главная</button>
        <button class="nav-btn active" onclick="location.href='events.html'">📅 Мероприятия</button>
        <!-- <button class="nav-btn" onclick="location.href='rating.html'">🏆 Рейтинг</button> -->
        <button class="nav-btn" onclick="location.href='organizations.html'">👥 Сообщества</button>
    </aside>

    <main class="content">
        <h1>Мероприятия</h1>
        
        <!-- Фильтры как в макете -->
        <div class="filters-bar">
            <div class="filter-item" id="dateFilter">
                Дата <i class="fas fa-chevron-down"></i>
                <!-- Календарь -->
                <div class="dropdown-menu calendar-dropdown" id="dateDropdown">
                    <div class="calendar-header">
                        <span class="calendar-month" id="currentMonth">Март 2026</span>
                        <div class="calendar-nav">
                            <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                            <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="calendar-weekdays">
                        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                    <div class="calendar-footer">
                        <button class="calendar-btn clear" id="clearDate">Сбросить</button>
                        <button class="calendar-btn apply" id="applyDate">Применить</button>
                    </div>
                </div>
            </div>
            
            <div class="filter-item" id="timeFilter">
                Время <i class="fas fa-chevron-up"></i>
                <div class="dropdown-menu" id="timeDropdown">
                    <div class="dropdown-item" data-time="all">Любое время</div>
                    <div class="dropdown-item" data-time="morning">Утро (до 12:00)</div>
                    <div class="dropdown-item" data-time="day">День (12:00-18:00)</div>
                    <div class="dropdown-item" data-time="evening">Вечер (после 18:00)</div>
                </div>
            </div>
            
            <div class="filter-item" id="communityFilter">
                Сообщество <i class="fas fa-chevron-down"></i>
                <div class="dropdown-menu" id="communityDropdown">
                    <!-- Данные будут загружаться из БД -->
                </div>
            </div>
            
            <div class="filter-item" id="formatFilter">
                Формат <i class="fas fa-chevron-down"></i>
                <div class="dropdown-menu" id="formatDropdown">
                    <!-- Данные будут загружаться из БД -->
                </div>
            </div>
            
            <div class="filter-item" id="locationFilter">
                Место <i class="fas fa-chevron-down"></i>
                <div class="dropdown-menu" id="locationDropdown">
                    <!-- Данные будут загружаться из БД -->
                </div>
            </div>
        </div>

        <!-- Активные фильтры -->
        <div class="active-filters" id="activeFilters"></div>
        
        <!-- Список мероприятий -->
        <div class="events-grid" id="eventsGrid">
            <div class="loading">
                <i class="fas fa-spinner"></i> Загрузка мероприятий...
            </div>
        </div>
    </main>

</div>
<script type="module" src="js/auth-state.js"></script>
<script src="js/events.js"></script>
<script>
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.body.insertAdjacentHTML('beforeend', data);
        });
</script>
</body>
</html>
