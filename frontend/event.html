<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мероприятие</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Дополнительные стили для страницы мероприятия */
        .event-page {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-to-list {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4f8df5;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .back-to-list:hover {
            transform: translateX(-5px);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-size: 16px;
        }

        .tab i {
            margin-right: 8px;
        }

        .tab.active {
            background: #4f8df5;
            color: white;
        }

        .tab:hover:not(.active) {
            background: #f0f0f0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Стили для страницы мероприятия */
        .event-header {
            margin-bottom: 30px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .event-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }

        .event-community-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            color: #4f8df5;
            font-weight: 500;
            text-decoration: none;
        }

        .event-community-link:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .event-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-main-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .info-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card h3 i {
            color: #4f8df5;
        }

        .info-card p {
            color: #666;
            line-height: 1.6;
        }

        .event-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            background: #f0f0f0;
            color: #666;
        }

        .event-tag.online {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .event-tag.offline {
            background: #e3f2fd;
            color: #1976d2;
        }

        .community-preview {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .community-preview:hover {
            background: #e8f0fe;
            transform: translateX(5px);
        }

        .community-preview .community-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, #4f8df5, #7ab6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .community-preview .community-icon.volunteer { background: linear-gradient(135deg, #ff8a3d, #ffb347); }
        .community-preview .community-icon.media { background: linear-gradient(135deg, #9c27b0, #ba68c8); }
        .community-preview .community-icon.science { background: linear-gradient(135deg, #2e7d32, #4caf50); }
        .community-preview .community-icon.sport { background: linear-gradient(135deg, #f44336, #ff7961); }
        .community-preview .community-icon.culture { background: linear-gradient(135deg, #e91e63, #ff6090); }

        .community-preview h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .community-preview p {
            font-size: 13px;
            color: #666;
        }

        .register-event-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f8df5, #7ab6ff);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .register-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79,141,245,0.3);
        }

        .register-event-btn.registered {
            background: linear-gradient(135deg, #28a745, #34ce57);
        }

        .similar-events {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .similar-events h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .similar-events h3 i {
            color: #4f8df5;
        }

        /* Стили для вкладки участника */
        .qr-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .qr-code img {
            width: 250px;
            height: 250px;
            display: block;
            margin: 0 auto;
        }

        .qr-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .qr-subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        .scan-instruction {
            background: #e8f0fe;
            color: #4f8df5;
            padding: 12px 24px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            margin: 20px 0;
        }

        .participant-info {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .participant-info h3 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .participant-info h3 i {
            color: #4f8df5;
        }

        .participant-info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .participant-info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .participant-info-value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #34ce57);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40,167,69,0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .loading i {
            margin-right: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 80px 20px;
        }

        .error-message i {
            font-size: 60px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .error-message h2 {
            color: #333;
            margin-bottom: 30px;
        }

        .placeholder-text {
            color: #999;
            text-align: center;
            padding: 30px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .status-sent {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="index.html">
            <img src="images/logo-nngasu.png" alt="ННГАСУ">
        </a>
    </div>
    <div class="header-title" id="pageTitle">Мероприятие</div>
    <div class="header-right" id="authSection">
        <a href="auth.html" class="auth-btn">Авторизация</a>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 Главная</button>
        <button class="nav-btn active" onclick="location.href='events.html'">📅 Мероприятия</button>
        <button class="nav-btn" onclick="location.href='organizations.html'">👥 Сообщества</button>
    </aside>

    <main class="content">
        <div class="event-page">
            <a href="events.html" class="back-to-list">
                <i class="fas fa-arrow-left"></i> К списку мероприятий
            </a>
            
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active" id="infoTab" onclick="switchTab('info')">
                    <i class="fas fa-info-circle"></i> Информация
                </button>
                <button class="tab" id="participantTab" onclick="switchTab('participant')">
                    <i class="fas fa-qrcode"></i> Для участника
                </button>
            </div>
            
            <!-- Контент вкладки "Информация" -->
            <div class="tab-content active" id="infoContent">
                <div class="event-page-container" id="eventContainer">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Загрузка мероприятия...
                    </div>
                </div>
            </div>
            
            <!-- Контент вкладки "Для участника" -->
            <div class="tab-content" id="participantContent">
                <div class="participant-container" id="participantContainer">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Загрузка паспорта мероприятия...
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module" src="js/auth-state.js"></script>
<script src="js/event-page.js"></script>
<script>
    function switchTab(tabName) {
        const infoTab = document.getElementById('infoTab');
        const participantTab = document.getElementById('participantTab');
        const infoContent = document.getElementById('infoContent');
        const participantContent = document.getElementById('participantContent');
        
        if (tabName === 'info') {
            infoTab.classList.add('active');
            participantTab.classList.remove('active');
            infoContent.classList.add('active');
            participantContent.classList.remove('active');
        } else {
            infoTab.classList.remove('active');
            participantTab.classList.add('active');
            infoContent.classList.remove('active');
            participantContent.classList.add('active');
            
            // Загружаем данные участника
            loadParticipantData();
        }
    }

    async function loadParticipantData() {
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        const container = document.getElementById('participantContainer');
        
        if (!eventId) return;
        
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка паспорта мероприятия...</div>';
        
        try {
            const token = localStorage.getItem('token');
            if (!token) {
                container.innerHTML = '<p style="text-align: center; padding: 50px;">Необходимо авторизоваться</p>';
                return;
            }
            
            // Загружаем полную информацию о мероприятии
            const eventResponse = await fetch(`http://localhost:8080/api/events/${eventId}`);
            if (!eventResponse.ok) throw new Error('Ошибка загрузки мероприятия');
            const event = await eventResponse.json();
            
            // Загружаем сообщество
            const communityResponse = await fetch(`http://localhost:8080/api/communities/${event.community_id}`);
            const community = await communityResponse.json();
            
            // Загружаем QR-код
            const qrResponse = await fetch(`http://localhost:8080/api/events/${eventId}/participant-qr`, {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!qrResponse.ok) {
                throw new Error(`Ошибка загрузки QR-кода: ${qrResponse.status}`);
            }
            
            const qrData = await qrResponse.json();

            // Определяем статус
            const statusClass = event.status === 2 ? 'status-approved' : (event.status === 1 ? 'status-sent' : 'status-rejected');
            const statusText = event.status === 2 ? 'Принято' : (event.status === 1 ? 'Отправлено' : 'Отклонено');

            // Форматируем булевы значения
            const formatMTO = (mto) => mto ? 'Да' : 'Нет';
            const formatPrint = (print) => print ? 'Да' : 'Нет';
            
            container.innerHTML = `
                <div class="qr-section">
                    <h2 class="qr-title">${event.title}</h2>
                    <p class="qr-subtitle">Ваш персональный QR-код для входа</p>
                    
                    <div class="qr-code">
                        <img src="${qrData.qrCode}" style="width: 250px; height: 250px; display: block; margin: 0 auto; border-radius: 8px;">
                    </div>
                    
                    <div class="scan-instruction">
                        <i class="fas fa-qrcode"></i>
                        <span>Предъявите этот код при входе на мероприятие</span>
                    </div>
                </div>
                
                <div class="participant-info">
                    <h3><i class="fas fa-passport"></i> Паспорт мероприятия</h3>
                    
                    <div class="participant-info-item">
                        <div class="participant-info-label">Название</div>
                        <div class="participant-info-value">${event.title}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Сообщество</div>
                        <div class="participant-info-value">${community.name}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Руководитель сообщества</div>
                        <div class="participant-info-value">${event.community_leader || 'Не указан'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Ответственный</div>
                        <div class="participant-info-value">${event.responsible_name || 'Не указан'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Дата и время</div>
                        <div class="participant-info-value">${event.date} ${event.time || '10:00'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Место</div>
                        <div class="participant-info-value">${event.location || event.place || 'Не указано'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Формат</div>
                        <div class="participant-info-value">${event.format || 'Офлайн'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">SMART-цель</div>
                        <div class="participant-info-value">${event.smart_goal || 'Не указана'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Целевая аудитория</div>
                        <div class="participant-info-value">${event.target_audience || 'Не указана'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Количественные показатели</div>
                        <div class="participant-info-value">${event.quantitative || 'Не указаны'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Качественные показатели</div>
                        <div class="participant-info-value">${event.qualitative || 'Не указаны'}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">МТО</div>
                        <div class="participant-info-value">${formatMTO(event.mto)}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Печатная продукция</div>
                        <div class="participant-info-value">${formatPrint(event.printing)}</div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Статус мероприятия</div>
                        <div class="participant-info-value">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                    <div class="participant-info-item">
                        <div class="participant-info-label">Полное описание</div>
                        <div class="participant-info-value" style="white-space: pre-line;">${event.description || 'Нет описания'}</div>
                    </div>
                    
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                        <button class="btn btn-success" onclick="downloadQRCode()">
                            <i class="fas fa-download"></i> Скачать QR-код
                        </button>
                        <button class="btn btn-secondary" onclick="switchTab('info')">
                            <i class="fas fa-arrow-left"></i> Назад
                        </button>
                    </div>
                </div>
            `;
            
        } catch (error) {
            console.error('Ошибка:', error);
            container.innerHTML = `<p style="color: #ff4444; text-align: center; padding: 50px;">Ошибка загрузки паспорта: ${error.message}</p>`;
        }
    }

    function downloadQRCode() {
        const qrImg = document.querySelector('.qr-code img');
        if (!qrImg) return;
        
        const link = document.createElement('a');
        link.download = 'qr-code.png';
        link.href = qrImg.src;
        link.click();
    }
</script>
<script>
    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.body.insertAdjacentHTML('beforeend', data);
        });
</script>
</body>
</html>
