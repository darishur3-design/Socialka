<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчет о мероприятии</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .report-page {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .report-title {
            font-size: 28px;
            color: #333;
        }
        
        .report-actions {
            display: flex;
            gap: 15px;
        }
        
        .report-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .report-btn.save {
            background: #4f8df5;
            color: white;
        }
        
        .report-btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79,141,245,0.3);
        }
        
        .report-btn.print {
            background: #28a745;
            color: white;
        }
        
        .report-btn.print:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40,167,69,0.3);
        }
        
        .report-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        @media print {
            .header, .sidebar, .report-actions, .back-btn {
                display: none !important;
            }
            .report-content {
                box-shadow: none;
                padding: 20px;
            }
            body {
                background: white;
            }
            .layout {
                height: auto;
            }
        }

        .passport-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4f8df5;
        }

        .passport-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .passport-subtitle {
            font-size: 18px;
            color: #666;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            color: #4f8df5;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .info-item {
            margin-bottom: 15px;
        }

        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .description-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="index.html">
            <img src="images/logo-nngasu.png" alt="ННГАСУ">
        </a>
    </div>
    <div class="header-title">Отчет о мероприятии</div>
    <div class="header-right" id="authSection">
        <a href="auth.html" class="auth-btn">Авторизация</a>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 Главная</button>
        <button class="nav-btn" onclick="location.href='events.html'">📅 Мероприятия</button>
        <button class="nav-btn" onclick="location.href='organizations.html'">👥 Сообщества</button>
    </aside>

    <main class="content">
        <div class="report-page">
            <div class="report-header">
                <h1 class="report-title">Отчет о мероприятии</h1>
                <div class="report-actions">
                    <button class="report-btn save" id="savePdfBtn">
                        <i class="fas fa-save"></i> Сохранить как PDF
                    </button>
                    <button class="report-btn print" id="printBtn">
                        <i class="fas fa-print"></i> Печать
                    </button>
                </div>
            </div>
            
            <div class="report-content" id="reportContent">
                <!-- Сюда будет загружаться паспорт мероприятия -->
                <div class="loading">
                    <i class="fas fa-spinner"></i> Загрузка отчета...
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module" src="js/auth-state.js"></script>
<script src="js/event-report.js"></script>
</body>
</html>
